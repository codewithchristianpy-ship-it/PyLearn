<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Learning Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>✨ Learning Hub ✨</h1>
    <p id="quote">Choose a topic to get started!</p>
    <button onclick="showQuote('love')">Learn about Love</button>
    <button onclick="showQuote('life')">Learn about Life</button>
    <button onclick="showQuote('programming')">Learn about Programming</button>
    <button onclick="showQuote('python')">Learn about Python</button>

    <h2>Chat with me</h2>
    <input type="text" id="userInput" placeholder="Ask me something...">
    <button onclick="chatBot()">Ask</button>
    <p id="chatReply"></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
